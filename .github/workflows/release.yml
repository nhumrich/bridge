name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: read

jobs:
  release:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/blinklang/blink:0.29
    steps:
      - uses: actions/checkout@v4

      - name: Build binaries
        run: |
          mkdir -p dist
          blink build src/main.bl --release -T linux -o dist/br-linux-amd64
          blink build src/main.bl --release -T linux-arm64 -o dist/br-linux-arm64
          blink build src/main.bl --release -T macos -o dist/br-darwin-amd64
          blink build src/main.bl --release -T macos-arm64 -o dist/br-darwin-arm64

      - name: Checksums
        run: |
          cd dist
          sha256sum br-* > checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/br-*
            dist/checksums.txt
