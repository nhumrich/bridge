version: '3'

vars:
  SRC: src/main.pact
  BIN: build/main
  INSTALL_PATH: ~/.local/bin/br

tasks:
  build:
    desc: Build the bridge binary
    cmds:
      - pact build {{.SRC}}
    sources:
      - src/*.pact
    generates:
      - "{{.BIN}}"

  install:
    desc: Build and install br to ~/.local/bin/
    deps: [build]
    cmds:
      - cp {{.BIN}} {{.INSTALL_PATH}}
      - chmod +x {{.INSTALL_PATH}}
      - echo "Installed br to {{.INSTALL_PATH}}"

  check:
    desc: Typecheck all source files
    cmds:
      - pact check {{.SRC}}

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -f {{.BIN}}

  test:
    desc: Run pact tests
    cmds:
      - pact test

  ci:
    desc: Run all checks (typecheck + build)
    cmds:
      - task: check
      - task: build

  dev:
    desc: Build and run with args (usage -- task dev -- add "my task")
    deps: [build]
    cmds:
      - "{{.BIN}} {{.CLI_ARGS}}"

  release:
    desc: Cross-compile release binaries to dist/
    cmds:
      - mkdir -p dist
      - pact build {{.SRC}} --release -T linux -o dist/br-linux-amd64
      - pact build {{.SRC}} --release -T linux-arm64 -o dist/br-linux-arm64
      - pact build {{.SRC}} --release -T macos -o dist/br-darwin-amd64
      - pact build {{.SRC}} --release -T macos-arm64 -o dist/br-darwin-arm64
      - cd dist && sha256sum br-* > checksums.txt
      - echo "Release binaries in dist/"

  bump:
    desc: "Bump version (usage: task bump -- 0.2.0)"
    cmds:
      - sed -i 's/^version = ".*"/version = "{{.CLI_ARGS}}"/' pact.toml
      - sed -i 's/set_version(p, ".*")/set_version(p, "{{.CLI_ARGS}}")/' src/main.pact
      - 'sed -i ''s/"version": ".*"/"version": "{{.CLI_ARGS}}"/'' .claude-plugin/plugin.json'
      - echo "Bumped to v{{.CLI_ARGS}}"
